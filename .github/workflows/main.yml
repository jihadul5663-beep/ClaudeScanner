name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Locate project (auto-detect zip name and folder name)
        id: locate
        run: |
          set -e

          # Step 1: if there's any .zip at the repo root, unzip it — whatever it's called.
          ZIP_FILE=$(find . -maxdepth 1 -iname "*.zip" | head -n 1)
          if [ -n "$ZIP_FILE" ]; then
            echo "Found zip: $ZIP_FILE"
            unzip -o "$ZIP_FILE" -d extracted_project
          fi

          # Step 2: find the Android project root by locating settings.gradle
          # anywhere in the repo — no need to know the folder's name in advance.
          PROJECT_DIR=$(find . -maxdepth 6 \( -name "settings.gradle" -o -name "settings.gradle.kts" \) \
            -not -path "*/build/*" | head -n 1 | xargs -r dirname)

          if [ -z "$PROJECT_DIR" ]; then
            echo "::error::Could not find an Android project (no settings.gradle found anywhere in the repo)."
            exit 1
          fi

          echo "Detected project directory: $PROJECT_DIR"
          echo "project_dir=$PROJECT_DIR" >> "$GITHUB_OUTPUT"

          # Step 3: detect the app module folder by locating AndroidManifest.xml
          # under src/main — search deep enough to actually find it this time,
          # and fall back to "app" if detection somehow still fails.
          MANIFEST_PATH=$(find "$PROJECT_DIR" -maxdepth 8 -path "*/src/main/AndroidManifest.xml" | head -n 1)
          if [ -n "$MANIFEST_PATH" ]; then
            APP_MODULE_DIR=$(echo "$MANIFEST_PATH" | sed -E 's|/src/main/AndroidManifest\.xml$||')
            APP_MODULE_NAME=$(basename "$APP_MODULE_DIR")
          else
            APP_MODULE_NAME="app"
          fi

          echo "Detected app module: $APP_MODULE_NAME"
          echo "app_module=$APP_MODULE_NAME" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate Gradle wrapper jar
        working-directory: ${{ steps.locate.outputs.project_dir }}
        run: gradle wrapper --gradle-version 8.6

      - name: Grant execute permission for gradlew
        working-directory: ${{ steps.locate.outputs.project_dir }}
        run: chmod +x gradlew

      - name: Build debug APK
        working-directory: ${{ steps.locate.outputs.project_dir }}
        run: ./gradlew assembleDebug --stacktrace

      - name: Locate built APK
        id: findapk
        run: |
          APK_PATH=$(find "${{ steps.locate.outputs.project_dir }}" -name "*.apk" -path "*/debug/*" | head -n 1)
          echo "Found APK at: $APK_PATH"
          echo "apk_path=$APK_PATH" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: ${{ steps.findapk.outputs.apk_path }}
