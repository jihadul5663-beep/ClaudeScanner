name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Unzip project (if source is zipped at repo root)
        run: |
          if [ -f PortScanner-Android.zip ]; then
            unzip -o PortScanner-Android.zip
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate Gradle wrapper jar
        working-directory: PortScanner
        run: gradle wrapper --gradle-version 8.6

      - name: Grant execute permission for gradlew
        working-directory: PortScanner
        run: chmod +x gradlew

      - name: Build debug APK
        working-directory: PortScanner
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: PortScanner-debug-apk
          path: PortScanner/app/build/outputs/apk/debug/app-debug.apk
